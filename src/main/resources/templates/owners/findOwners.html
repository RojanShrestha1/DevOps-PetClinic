<body>
  <div class="py-4 mb-4 text-white rounded shadow-sm bg-primary bg-gradient px-4">
    <h2 class="mb-1" th:text="#{findOwners}">Find Owners</h2>
    <p class="mb-0 opacity-75">Search for system administrators and resource owners within the FinOps Guardian network.</p>
  </div>

  <div class="card border-0 shadow-lg">
    <div class="card-body p-5">
      <form th:object="${owner}" th:action="@{/owners}" method="get" class="form-horizontal" id="search-owner-form">
        
        <div class="row mb-4 align-items-center">
          <label class="col-sm-3 fw-bold text-secondary" th:text="#{lastName}">Last name</label>
          <div class="col-sm-9">
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="fa fa-search text-muted"></i>
              </span>
              <input class="form-control form-control-lg border-start-0 bg-light" 
                     placeholder="Enter owner last name..."
                     th:field="*{lastName}" size="30" maxlength="80" />
            </div>
            <div class="mt-2 text-danger small" th:if="${#fields.hasAnyErrors()}">
               <p th:each="err : ${#fields.allErrors()}" th:text="${err}" class="mb-0">Error</p>
            </div>
          </div>
        </div>

        <div class="d-flex gap-2 justify-content-end border-top pt-4">
          <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm">
            <i class="fa fa-filter me-2"></i> <span th:text="#{findOwner}">Find Owner</span>
          </button>
          <a class="btn btn-outline-success btn-lg px-4 shadow-sm" th:href="@{/owners/new}">
            <i class="fa fa-plus me-2"></i> <span th:text="#{addOwner}">Add New Owner</span>
          </a>
        </div>

      </form>
    </div>
  </div>
</body>
