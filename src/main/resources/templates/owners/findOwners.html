<body>
  <div class="p-5 mb-4 bg-dark text-white rounded-3 shadow">
    <div class="container-fluid py-2">
      <h1 class="display-5 fw-bold">FinOps Guardian: Resource Search</h1>
      <p class="col-md-8 fs-4 text-secondary">Identify resource owners across your cloud infrastructure.</p>
    </div>
  </div>

  <h2 th:text="#{findOwners}" class="mb-4">Find Owners</h2>

  <div class="card shadow-sm p-4 border-0 bg-light">
    <form th:object="${owner}" th:action="@{/owners}" method="get" class="form-horizontal" id="search-owner-form">
      <div class="form-group mb-3">
        <div class="control-group row" id="lastNameGroup">
          <label class="col-sm-2 control-label fw-bold" th:text="#{lastName}">Last name </label>
          <div class="col-sm-10">
            <input class="form-control form-control-lg border-primary" th:field="*{lastName}" size="30" maxlength="80" placeholder="Type a name to search..." />
            <span class="help-inline text-danger">
              <div th:if="${#fields.hasAnyErrors()}">
                <p th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</p>
              </div>
            </span>
          </div>
        </div>
      </div>
      
      <div class="form-group mt-4">
        <div class="col-sm-offset-2 col-sm-10 d-flex gap-2">
          <button type="submit" class="btn btn-primary btn-lg px-4" th:text="#{findOwner}">Find Owner</button>
          <a class="btn btn-outline-dark btn-lg px-4" th:href="@{/owners/new}" th:text="#{addOwner}">Add Owner</a>
        </div>
      </div>
    </form>
  </div>
</body>
