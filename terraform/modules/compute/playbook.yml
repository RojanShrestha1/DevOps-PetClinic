---
- name: Deploy Gradle App via Docker
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: 1. Update apt cache and install prerequisites
      apt:
        pkg:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
        state: present
        update_cache: yes

    - name: 2. Add Docker GPG apt Key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: 3. Add Docker Repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present

    - name: 4. Install Docker CE
      apt:
        name: docker-ce
        state: present
        update_cache: yes

    - name: 5. Install Docker Python SDK (Crucial for Ansible)
      apt:
        name: python3-docker
        state: present

    - name: 6. Ensure Docker is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: 7. Pull and Run Gradle Container
      # WARNING: Replace 'your-docker-username/gradle-app:latest' with your real Hub image
      community.docker.docker_container:
        name: gradle-app
        image: "rojanshr/spring-petclinic:latest"
        state: started
        restart_policy: always
        published_ports:
          - "8080:8080"
        env:
          MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "prometheus,health,metrics"  
          

    - name: 8. Download Node Exporter
      get_url:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.8.1/node_exporter-1.8.1.linux-amd64.tar.gz
        dest: /tmp/node_exporter.tar.gz

    - name: 9. Unarchive Node Exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /opt/
        remote_src: yes

    - name: 10. Create Node Exporter Systemd Service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target

          [Service]
          User=ubuntu
          ExecStart=/opt/node_exporter-1.8.1.linux-amd64/node_exporter

          [Install]
          WantedBy=multi-user.target

    - name: 11. Start and Enable Node Exporter
      systemd:
        name: node_exporter
        state: started
        enabled: yes
        daemon_reload: yes
    