global:
  scrape_interval: 15s # How often to poll for metrics
  evaluation_interval: 15s

scrape_configs:
  # 1. Monitor Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 2. Dynamic Discovery for your App Servers
  - job_name: 'petclinic-app'
    metrics_path: '/actuator/prometheus' # Spring Boot Actuator endpoints
    ec2_sd_configs:
      - region: 'ap-south-1' # <-- CRITICAL: Change this to your actual AWS region (e.g., ap-south-1)
        port: 8080          # The port where your Spring Boot/Gradle app runs
    
relabel_configs:
      # Filter: Only keep instances with your specific ASG tag
      - source_labels: [__meta_ec2_tag_Name]
        regex: 'gradle-project-asg-instance'
        action: keep

      # MANDATORY: This tells Prometheus to use the Private IP:Port for scraping
      - source_labels: [__meta_ec2_private_ip]
        replacement: '${1}:8080'
        target_label: __address__

      # OPTIONAL: This makes your dashboard look pretty by showing the IP as the instance name
      - source_labels: [__meta_ec2_private_ip, __meta_ec2_availability_zone]
        target_label: instance