name: PetClinic CI/CD Pipeline

on:
  push:
    branches-ignore: ["main"] 

jobs:
  # JOB 1: Build and SonarCloud Analysise
  sonar:
    name: Build and SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Give permissions to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build and Run SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew build sonar \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.projectKey=RojanShrestha1_DevOps-PetClinic \
            -Dsonar.organization=rojanshrestha1 \
            -Dsonar.host.url=https://sonarcloud.io

  # JOB 2: Docker Build and Push
  docker:
    name: Build and Push Docker Image
    needs: sonar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Give permissions to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-petclinic:v1.0.0
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-petclinic:build_v-${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-petclinic:latest

  # JOB 3: Infrastructure Update
  update-infra:
    name: Refresh AWS Infrastructure
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # --- Step A: Update Infrastructure (Terraform) ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Apply
        env:
          TF_VAR_aws_region: "${{ vars.AWS_REGION }}"
          TF_VAR_vpc_cidr_root: "${{ vars.VPC_CIDR_ROOT }}"
          TF_VAR_pub_sub_1a_cidr: "${{ vars.PUB_SUB_1A_CIDR }}"
          TF_VAR_pub_sub_1b_cidr: "${{ vars.PUB_SUB_1B_CIDR }}"
          
        run: terraform apply -auto-approve
        working-directory: ./terraform

      # --- Step B: Trigger Rolling Update (Refresh ASG) ---
      - name: Refresh ASG Instances
        env:
          ASG_NAME: ${{ secrets.ASG_NAME }} 
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --preferences '{"MinHealthyPercentage": 50}'