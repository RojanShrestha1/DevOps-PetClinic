name: PetClinic CI/CD Pipeline

on:
  push:
    branches-ignore: ["main"]

jobs:
  # JOB 1: Build and SonarCloud Analysis
  sonar:
    name: Build and SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for Sonar to see full Git history

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Give permissions to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build and Run SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew build sonar \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.projectKey=RojanShrestha1_DevOps-PetClinic \
            -Dsonar.organization=rojanshrestha1 \
            -Dsonar.host.url=https://sonarcloud.io

  # JOB 2: Docker Build and Push
  docker:
    name: Build and Push Docker Image
    needs: sonar  # only runs if sonar job passes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Give permissions to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-petclinic:v1.0.0
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-petclinic:build_v-${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-petclinic:latest

