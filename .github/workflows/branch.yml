name: Branch Preview Pipeline

on:
  push:
    branches-ignore:
      - "main"

jobs:
  build-preview:
    name: Build & Push Preview Image
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java (needed to build Spring Boot JAR)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Build the JAR (🔥 THIS FIXES YOUR ISSUE)
      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      # 4. Debug (optional but useful)
      - name: Check JAR exists
        run: ls -lh target/

      # 5. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Build and Push Docker Image
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          pull: true
          build-args: |
            CACHE_BUST=${{ github.run_number }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-petclinic:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-petclinic:preview-${{ github.run_number }}