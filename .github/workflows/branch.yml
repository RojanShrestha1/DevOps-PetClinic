name: Branch Preview Pipeline

on:
  push:
    # This runs on any branch EXCEPT main
    branches-ignore:
      - "main"

jobs:
  # JOB 1: Quick Test (Ensuring UI doesn't break I18n)
  quick-test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Package
        run: ./mvnw clean package -DskipTests

  # JOB 2: Branch Image Packaging
  build-preview:
    name: Build Preview Image
    needs: quick-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Preview
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
              ${{ secrets.DOCKERHUB_USERNAME }}/spring-petclinic:${{ github.ref_name }}
              ${{ secrets.DOCKERHUB_USERNAME }}/spring-petclinic:preview-${{ github.run_number }}